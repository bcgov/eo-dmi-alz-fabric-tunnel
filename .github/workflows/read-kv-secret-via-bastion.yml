name: Read Key Vault Secret Via Bastion

on:
  workflow_dispatch:
    inputs:
      resource_group_name:
        description: "Resource group that contains the Bastion host and jumpbox VM"
        required: true
      key_vault_name:
        description: "Key Vault name to read through the tunnel"
        required: true
      secret_name:
        description: "Key Vault secret name to read"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  read-secret:
    runs-on: ubuntu-24.04
    environment: tools
    name: Read Key Vault secret through Bastion tunnel
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure CLI Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Make scripts executable
        shell: bash
        run: |
          chmod +x ./infra/scripts/read-kv-secret-via-bastion.sh

      - name: Read secret through Bastion tunnel
        shell: bash
        env:
          CI: "true"
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_EXTENSION_DIR: ${{ runner.temp }}/az-cliextensions-bastion-secret-read
        run: |
          set -euo pipefail

          ./infra/scripts/read-kv-secret-via-bastion.sh \
            --resource-group "${{ inputs.resource_group_name }}" \
            --key-vault-name "${{ inputs.key_vault_name }}" \
            --secret-name "${{ inputs.secret_name }}"